<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maps Harvester V5</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #3b82f6;
        --accent-glow: #60a5fa;
        --danger: #ef4444;
        --success: #10b981;
        --sheets: #10b981;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Mesmerizing Header */
      .header {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      .header h1 {
        font-size: 1.3rem;
        font-weight: 900;
        background: linear-gradient(to right, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .indicator {
        height: 12px;
        width: 12px;
        border-radius: 50%;
        background-color: var(--danger);
        box-shadow: 0 0 10px var(--danger);
        transition: all 0.3s;
      }
      .indicator.active {
        background-color: var(--success);
        box-shadow: 0 0 15px var(--success);
        animation: heartbeat 1.5s infinite;
      }

      .content-area {
        padding: 16px;
        flex-grow: 1;
        overflow-y: auto;
        padding-bottom: 90px;
      }
      .card {
        background: rgba(30, 41, 59, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        backdrop-filter: blur(5px);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
      }
      .stat-box {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 12px;
        text-align: center;
      }
      .stat-label {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .stat-value {
        font-size: 2rem;
        font-weight: 900;
        color: var(--accent-glow);
        text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
      }

      /* Word Cloud */
      #wordCloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        padding: 10px 0;
        min-height: 50px;
      }
      .cloud-word {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 12px;
        background: rgba(59, 130, 246, 0.2);
        color: #93c5fd;
        font-weight: 600;
        transition: transform 0.3s;
      }
      .cloud-word:hover {
        transform: scale(1.1);
        background: rgba(59, 130, 246, 0.4);
      }

      input,
      select {
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 10px;
        border-radius: 8px;
        width: 100%;
        margin-bottom: 10px;
        font-size: 0.85rem;
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 5px rgba(59, 130, 246, 0.5);
      }
      h3 {
        font-size: 0.85rem;
        color: #e2e8f0;
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 700;
      }

      .terminal {
        background: #000;
        border-radius: 8px;
        border: 1px solid #333;
        height: 140px;
        display: flex;
        flex-direction: column;
        margin-bottom: 16px;
      }
      .terminal-body {
        padding: 10px;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 0.7rem;
        color: #4ade80;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .log-error {
        color: #f87171;
      }
      .log-info {
        color: #60a5fa;
      }
      .log-success {
        color: #a78bfa;
      }

      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 800;
        cursor: pointer;
        color: white;
        transition: all 0.2s;
        margin-bottom: 8px;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
      }
      .btn-primary {
        background: linear-gradient(45deg, #2563eb, #4f46e5);
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
      }
      .btn-primary:hover {
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        transform: translateY(-2px);
      }
      .btn-sheets {
        background: linear-gradient(45deg, #059669, #10b981);
      }
      .btn-disabled {
        background: #334155;
        color: #94a3b8;
        cursor: not-allowed;
        box-shadow: none;
      }
      .btn-text {
        background: transparent;
        color: var(--muted);
        border: 1px solid #334155;
      }
      .bottom-bar {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
        padding: 16px;
        display: flex;
        gap: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      @keyframes heartbeat {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>Maps Harvester V5</h1>
        <p style="color: #94a3b8; font-size: 0.7rem">
          Scoring & Niche Analytics
        </p>
      </div>
      <div id="statusIndicator" class="indicator"></div>
    </div>

    <div class="content-area">
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Session Leads</div>
          <div id="leadCount" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Skipped (Dupes)</div>
          <div
            id="skippedCount"
            class="stat-value"
            style="color: #94a3b8; text-shadow: none"
          >
            0
          </div>
        </div>
        <div class="stat-box">
          <div class="stat-label">High Priority</div>
          <div id="highPriorityCount" class="stat-value">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Emails Found</div>
          <div id="emailLeadCount" class="stat-value">0</div>
        </div>
      </div>

      <div class="card">
        <h3>Live Niche Analytics</h3>
        <div id="wordCloud">
          <span style="color: #475569; font-size: 0.75rem"
            >Waiting for data...</span
          >
        </div>
      </div>

      <div class="card">
        <h3>Target Settings</h3>
        <input type="number" id="limit" value="100" placeholder="Max Leads" />
        <input
          type="text"
          id="baseLocation"
          placeholder="Your Base Address (For distance routing)"
        />
      </div>

      <div class="card">
        <h3>Saved Search Presets</h3>
        <p
          id="currentQueryLabel"
          style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px"
        >
          Current query: awaiting active Maps tab...
        </p>
        <input type="text" id="profileName" placeholder="Preset name" />
        <button id="saveSearchProfile" class="btn btn-primary">
          Save Search Profile
        </button>
        <select id="savedSearches">
          <option value="">Select saved profile</option>
        </select>
        <button id="applySavedSearch" class="btn btn-sheets">
          Activate Profile
        </button>
      </div>

      <div class="terminal">
        <div id="logContainer" class="terminal-body">
          <div style="color: #64748b">> V5 Neural Engine Online.</div>
        </div>
      </div>

      <div class="card">
        <h3>Export CRM Data</h3>
        <input
          type="text"
          id="webhookUrl"
          placeholder="Webhook URL (n8n, Zapier, Make)"
        />
        <select id="webhookPayloadMode">
          <option value="raw">Raw JSON Payload</option>
          <option value="crm">CRM Mapped Payload</option>
        </select>
        <button id="sendWebhook" class="btn btn-sheets">
          Push Leads to Webhook
        </button>
        <select id="exportFilter">
          <option value="all">Export All Leads</option>
          <option value="email">Export Only Leads with Emails</option>
        </select>
        <select id="statusFilter">
          <option value="all">Status: All Leads</option>
          <option value="high-priority">Status: High Priority</option>
          <option value="contacted">Status: Contacted</option>
          <option value="no-email">Status: No Email</option>
          <option value="new">Status: New</option>
        </select>
        <div style="display: flex; gap: 8px; margin-bottom: 8px">
          <input
            id="leadTagInput"
            type="text"
            placeholder="Add workflow tag"
            style="flex: 1"
          />
          <button id="applyTag" class="btn btn-text" style="flex: 0 0 120px">
            Apply Tag
          </button>
        </div>
        <button id="exportCSV" class="btn btn-primary">
          Download Intelligent CSV
        </button>
        <button id="clearData" class="btn btn-text">Purge Memory</button>
      </div>
    </div>

    <div class="bottom-bar">
      <button id="startBtn" class="btn btn-primary" style="flex: 2">
        Deploy Scanner
      </button>
      <button id="stopBtn" class="btn btn-disabled" disabled style="flex: 1">
        Halt
      </button>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
